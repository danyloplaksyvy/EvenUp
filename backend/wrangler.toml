name = "evenup-worker"
main = "src/worker.ts"
compatibility_date = "2026-06-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
PUBLIC_BASE_URL = "https://evenup-worker.danyaplaksyvy.workers.dev"
RECEIPT_PARSE_AUDIT = "false"
ALLOW_ANONYMOUS_V1_WRITES = "true"
APP_CHECK_ENFORCED = "false"

[triggers]
crons = ["17 * * * *"]

# Add environment-specific Hyperdrive/R2 bindings in wrangler environment
# configuration or CI. Do not commit connection strings or credentials.

[[d1_databases]]
binding = "EXPENSES_DB"
database_name = "evenup-expenses-db"
database_id = "f157e75b-9a20-4739-b3a1-012864f91591"
