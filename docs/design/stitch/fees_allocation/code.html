<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md bg-surface min-h-screen relative shadow-sm border-x border-outline-variant/20 flex flex-col">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-surface flex justify-between items-center w-full px-4 h-16 sticky z-10">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors text-primary">

</button>
<h1 class="text-headline-md font-headline-md font-black text-primary">EvenUp</h1>
<button aria-label="Close" class="p-2 -mr-2 rounded-full hover:bg-surface-variant transition-colors text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 px-5 pt-4 pb-32 overflow-y-auto">
<!-- Header section -->
<div class="mb-8">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-primary mb-2">Split tax &amp; tip</h2>
<p class="text-body-md font-body-md text-secondary">Review and adjust how extra fees are shared.</p>
</div>
<!-- Summary Cards -->
<div class="flex gap-4 mb-8">
<div class="flex-1 bg-surface-container-low rounded-xl p-4 border border-outline-variant/30 flex flex-col items-start">
<span class="text-label-sm font-label-sm text-secondary uppercase tracking-wider mb-1">Tax</span>
<span class="text-headline-md font-headline-md text-primary">€6.50</span>
</div>
<div class="flex-1 bg-surface-container-low rounded-xl p-4 border border-outline-variant/30 flex flex-col items-start">
<span class="text-label-sm font-label-sm text-secondary uppercase tracking-wider mb-1">Tip</span>
<span class="text-headline-md font-headline-md text-primary">€12.00</span>
</div>
</div>
<!-- Split Modes Segmented Control -->
<div class="bg-surface-container rounded-xl p-1 flex mb-4">
<button class="flex-1 py-2 text-label-lg font-label-lg rounded-lg bg-primary text-on-primary shadow-sm transition-all text-center">
                    Equal
                </button>
<button class="flex-1 py-2 text-label-lg font-label-lg rounded-lg text-secondary hover:text-primary transition-all text-center">
                    Proportional
                </button>
<button class="flex-1 py-2 text-label-lg font-label-lg rounded-lg text-secondary hover:text-primary transition-all text-center">
                    Custom
                </button>
</div>
<!-- Helper Text -->
<p class="text-label-sm font-label-sm text-secondary text-center mb-8 px-4">
                Based on each person’s item subtotal.
            </p>
<!-- Preview List -->
<div class="flex flex-col gap-1">
<!-- User Row: You -->
<div class="flex items-center justify-between py-3 px-2 rounded-xl hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed font-bold text-label-lg">
                            Y
                        </div>
<span class="text-body-lg font-body-lg text-primary">You</span>
</div>
<span class="text-body-lg font-body-lg text-primary">€4.63</span>
</div>
<!-- User Row: Anna -->

                        </div>
<span class="text-body-lg font-body-lg text-primary">Anna</span>
</div>
<span class="text-body-lg font-body-lg text-primary">€4.63</span>
</div>

</div>
