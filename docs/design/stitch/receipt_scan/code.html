<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom subtle pulsing animation for the scanning guide */
        @keyframes scan-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; border-color: #000; }
        }
        .animate-scan {
            animation: scan-pulse 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-full flex flex-col antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface text-primary flex justify-between items-center w-full px-4 h-16 z-10 shrink-0">
<button aria-label="Close" class="p-2 hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center rounded-full">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Scan receipt</h1>
<div class="w-10"></div> <!-- Spacer to balance header -->
</header>
<!-- Main Content Area: Camera Viewport -->
<main class="flex-1 relative flex flex-col bg-inverse-surface w-full max-w-md mx-auto">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 bg-cover bg-center z-0" data-alt="A first-person perspective looking down through a smartphone camera lens at a slightly crumpled, detailed white restaurant receipt lying flat on a dark wooden cafe table. The lighting is bright, clear, and natural, creating a high-contrast, minimalist aesthetic. The focus is sharp on the receipt details, suggesting a digital scanning process in a modern fintech application context." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDLGSnAJrMiDTJgEau9g_w-2UPwcocK5dz_oI-eK2AH0V3l371Jr95YLpBlJQq2lVAIDeLfU5f_zNEWDLjTKKmy9U6DcauipdmBiIb3ibWcXU-FyPoSCf7ql2_L0Ve_R1q_8IwtWMNJuWQTRkduwv3cmfFmzN-N6MlKUlhN933JrkEnx7957tqJGekBYOzVkL2zDAGS4oa1Z3pxcN7eZrBsLNpmmoprZfdl_T4BVnld99fB6Vzt2QDAmQ3VezrnE-FcmQ2-wit6kGAU');">
<!-- Darken overlay to make guides pop -->
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Scanning Guides -->
<div class="flex-1 relative z-10 p-6 flex flex-col items-center justify-center pointer-events-none">
<!-- Reticle / Bounding Box -->
<div class="w-full max-w-xs aspect-[3/4] border-2 border-white/50 rounded-2xl relative animate-scan">
<!-- Corner accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-2xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-2xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-2xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-2xl"></div>
</div>
<p class="mt-8 text-on-primary text-body-md font-body-md text-center bg-black/50 px-4 py-2 rounded-full backdrop-blur-sm">Align receipt within the frame</p>
</div>
<!-- Bottom Controls Bar -->
<div class="bg-surface w-full p-6 pb-10 flex flex-col items-center gap-6 z-20 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.05)] shrink-0">
<!-- Shutter Button -->
<button class="relative w-20 h-20 rounded-full border-4 border-surface-variant bg-surface flex items-center justify-center group focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" id="btn-capture">
<div class="w-16 h-16 rounded-full bg-primary group-hover:bg-primary/90 group-active:scale-90 transition-all duration-200"></div>
</button>
<!-- Gallery Option -->
<button class="flex items-center gap-2 px-4 py-2 text-label-lg font-label-lg text-secondary hover:text-primary transition-colors rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[20px]">photo_library</span>
                Choose from gallery
            </button>
</div>
<!-- OVERLAYS (Stacked within the relative main container for scoping) -->
<!-- Loading Overlay (Initially Hidden) -->
<div class="absolute inset-0 z-50 bg-surface/95 backdrop-blur-md flex flex-col items-center justify-center p-6 hidden transition-opacity duration-300 opacity-0" id="overlay-loading">
<div class="relative mb-6">
<span class="material-symbols-outlined text-[48px] text-surface-variant">receipt_long</span>
<span class="material-symbols-outlined animate-spin text-[48px] text-primary absolute inset-0">autorenew</span>
</div>
<h2 class="text-headline-md font-headline-md text-primary mb-3 text-center">Reading receipt...</h2>
<p class="text-body-md font-body-md text-secondary text-center max-w-[280px]">Detecting items, tax, tip, and total. This usually takes just a second.</p>
</div>
<!-- Error Overlay (Initially Hidden) -->
<div class="absolute inset-0 z-50 bg-surface flex flex-col items-center justify-center p-6 hidden transition-opacity duration-300 opacity-0" id="overlay-error">
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-[32px] text-error fill">warning</span>
</div>
<h2 class="text-headline-md font-headline-md text-primary mb-3 text-center">We couldn't read this receipt</h2>
<p class="text-body-md font-body-md text-secondary text-center max-w-[300px] mb-10">Make sure the receipt is fully visible, well-lit, and text is clear.</p>
<div class="w-full flex flex-col gap-3 max-w-sm">
<button class="w-full py-4 rounded-xl bg-primary text-on-primary text-label-lg font-label-lg text-center hover:bg-primary/90 active:scale-[0.98] transition-all" id="btn-try-again">
                    Try again
                </button>
<button class="w-full py-4 rounded-xl bg-surface-variant text-primary text-label-lg font-label-lg text-center hover:bg-surface-container-high active:scale-[0.98] transition-all">
                    Enter manually
                </button>
</div>
</div>
</main>
<!-- Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCapture = document.getElementById('btn-capture');
            const btnTryAgain = document.getElementById('btn-try-again');
            const overlayLoading = document.getElementById('overlay-loading');
            const overlayError = document.getElementById('overlay-error');

            function showOverlay(overlay) {
                overlay.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100');
                }, 10);
            }

            function hideOverlay(overlay) {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                // Wait for transition before hiding
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            }

            // Simulate capture process
            btnCapture.addEventListener('click', () => {
                showOverlay(overlayLoading);
                
                // Simulate network request/processing delay, then show error state for demonstration
                setTimeout(() => {
                    hideOverlay(overlayLoading);
                    setTimeout(() => {
                        showOverlay(overlayError);
                    }, 300);
                }, 2500);
            });

            // Reset flow
            btnTryAgain.addEventListener('click', () => {
                hideOverlay(overlayError);
            });
        });
    </script>
</body></html>
